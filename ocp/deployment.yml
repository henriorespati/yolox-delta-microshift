apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolox-s
  namespace: yolox-edge
spec:
  replicas: 1

  selector:
    matchLabels:
      app: yolox-s

  template:
    metadata:
      labels:
        app: yolox-s

    spec:
      containers:
      - name: yolox-s
        image: localhost/yolox-s-inference:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        env:
        - name: MODEL_PATH
          value: /models/yolox_s.pth

        - name: CONF_THRESHOLD
          value: "0.25"

        - name: NMS_THRESHOLD
          value: "0.45"

        - name: INPUT_SIZE
          value: "640"

        - name: NUM_CLASSES
          value: "80"

        volumeMounts:
        - name: model-volume
          mountPath: /models
          readOnly: true

        resources:
          requests:
            cpu: "250m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "3Gi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30

      volumes:
      - name: model-volume
        hostPath:
          path: /opt/models
          type: Directory
